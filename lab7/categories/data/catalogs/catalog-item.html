<div class="col-md-6 col-12 mb-4"> <div class="catalog-item-container p-3 border rounded bg-white h-100">
        <div class="row">
            <div class="col-sm-5 col-12">
                <div class="catalog-item-photo">
                    <img class="img-fluid" src="categories/data/catalogs/images/{{catalogShortName}}/{{short_name}}.jpg" alt="{{name}}">
                </div>
                <div class="catalog-item-price text-danger fw-bold mt-2">
                    {{price}}
                </div>
            </div>

            <div class="col-sm-7 col-12">
                <h3 class="catalog-item-title h5">{{name}}</h3>
                <p class="catalog-item-details small text-muted">{{description}}</p>
            </div>
        </div>
    </div>
    <hr class="d-block d-md-none">
</div>
